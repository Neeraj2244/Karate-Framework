# =============================================================================
#  REGRESSION TESTS — Runs automatically on every push to main
#  Runs all scenarios tagged @RegressionTest
#  Trigger: Automatic — fires whenever code is pushed to the main branch
# =============================================================================

name: Regression Tests

on:
  push:
    branches:
      - main

jobs:
  regression:
    name: Run @RegressionTest scenarios
    runs-on: ubuntu-latest

    # grpcbin supports the @RegressionTest-tagged gRPC scenarios in GrpcBasic.feature
    services:
      grpcbin:
        image: moul/grpcbin
        ports:
          - 9000:9000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install grpcurl
        run: |
          GRPCURL_VERSION=1.9.1
          curl -sSL \
            "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz" \
            | tar -xz -C /tmp grpcurl
          sudo mv /tmp/grpcurl /usr/local/bin/grpcurl
          grpcurl --version

      - name: Wait for grpcbin to be ready
        run: |
          echo "Waiting for grpcbin on localhost:9000 ..."
          for i in $(seq 1 15); do
            grpcurl -plaintext localhost:9000 list && echo "grpcbin is up!" && break
            echo "  attempt $i/15 — retrying in 2 s"
            sleep 2
          done

      - name: Run Regression Tests
        shell: pwsh
        env:
          KARATE_LOGBACK : logback-ci.xml
          GRPC_HOST            : localhost
          GRPC_PORT            : "9000"
          AUTH_TOKEN           : ${{ secrets.AUTH_TOKEN }}
          API_KEY              : ${{ secrets.API_KEY }}
          CLIENT_ID            : ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET        : ${{ secrets.CLIENT_SECRET }}
          DUMMY_JSON_USERNAME  : ${{ secrets.DUMMY_JSON_USERNAME }}
          DUMMY_JSON_PASSWORD  : ${{ secrets.DUMMY_JSON_PASSWORD }}
        run: |
          ./karate.ps1 tags "@RegressionTest" `
            -KarateEnv "dev" `
            -Output "target/karate-reports"

      - name: Upload Regression Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report-${{ github.run_number }}
          path: target/karate-reports/
          retention-days: 14
