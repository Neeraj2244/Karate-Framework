# =============================================================================
#  REGRESSION TESTS — Runs automatically on every push to main
#  Runs all scenarios tagged @RegressionTest
#  Trigger: Automatic — fires whenever code is pushed to the main branch
# =============================================================================

name: Regression Tests

on:
  push:
    branches:
      - main

jobs:
  regression:
    name: Run @RegressionTest scenarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Run Regression Tests
        shell: pwsh
        env:
          KARATE_LOGBACK : logback-ci.xml
          AUTH_TOKEN           : ${{ secrets.AUTH_TOKEN }}
          API_KEY              : ${{ secrets.API_KEY }}
          CLIENT_ID            : ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET        : ${{ secrets.CLIENT_SECRET }}
          DUMMY_JSON_USERNAME  : ${{ secrets.DUMMY_JSON_USERNAME }}
          DUMMY_JSON_PASSWORD  : ${{ secrets.DUMMY_JSON_PASSWORD }}
        run: |
          ./karate.ps1 tags "@RegressionTest" `
            -KarateEnv "dev" `
            -Output "target/karate-reports"

      - name: Upload Regression Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report-${{ github.run_number }}
          path: target/karate-reports/
          retention-days: 14
