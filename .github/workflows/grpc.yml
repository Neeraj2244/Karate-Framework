# =============================================================================
#  gRPC TESTS — Manual trigger only
#  Runs all scenarios tagged @gRPC against a grpcbin Docker service container.
#
#  Stack:
#    • moul/grpcbin  — Docker service container exposing gRPC test endpoints
#                       hello.HelloService  (port 9000, plain-text)
#                       addsvc.Add          (port 9000, plain-text)
#    • grpcurl       — CLI tool that translates JSON ↔ gRPC (installed in step)
#    • Karate        — orchestrates the calls via Java ProcessBuilder
#
#  Trigger: GitHub UI → Actions → gRPC Tests → Run workflow
# =============================================================================

name: gRPC Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to test against"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  grpc-tests:
    name: Run @gRPC scenarios
    runs-on: ubuntu-latest

    # grpcbin exposes plain-text gRPC on port 9000 and TLS on 9001.
    # Tests use plain-text (no TLS) so only 9000 is needed.
    services:
      grpcbin:
        image: moul/grpcbin
        ports:
          - 9000:9000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install grpcurl
        run: |
          GRPCURL_VERSION=1.9.1
          curl -sSL \
            "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz" \
            | tar -xz -C /tmp grpcurl
          sudo mv /tmp/grpcurl /usr/local/bin/grpcurl
          grpcurl --version

      - name: Wait for grpcbin to be ready
        run: |
          echo "Waiting for grpcbin on localhost:9000 ..."
          for i in $(seq 1 15); do
            grpcurl -plaintext localhost:9000 list && echo "grpcbin is up!" && break
            echo "  attempt $i/15 — retrying in 2 s"
            sleep 2
          done

      - name: Run gRPC Tests
        shell: pwsh
        env:
          KARATE_LOGBACK       : logback-ci.xml
          GRPC_HOST            : localhost
          GRPC_PORT            : "9000"
          DUMMY_JSON_USERNAME  : ${{ secrets.DUMMY_JSON_USERNAME }}
          DUMMY_JSON_PASSWORD  : ${{ secrets.DUMMY_JSON_PASSWORD }}
        run: |
          ./karate.ps1 tags "@gRPC" `
            -KarateEnv "${{ inputs.environment }}" `
            -Output "target/karate-reports"

      - name: Upload gRPC Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: grpc-report-${{ github.run_number }}
          path: target/karate-reports/
          retention-days: 7
