# =============================================================================
#  SANITY TESTS — Manual trigger only
#  Runs all scenarios tagged @SanityTest
#  Trigger: GitHub UI → Actions → Sanity Tests → Run workflow
# =============================================================================

name: Sanity Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to test against"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  sanity:
    name: Run @SanityTest scenarios
    runs-on: ubuntu-latest

    # grpcbin is required because GrpcBasic.feature has @SanityTest at feature level —
    # all its scenarios inherit that tag and will run here.
    services:
      grpcbin:
        image: moul/grpcbin
        ports:
          - 9000:9000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Karate JAR
        uses: actions/cache@v4
        with:
          path: karate-2.0.10.jar
          key: karate-jar-${{ hashFiles('karate-2.0.10.jar') }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install grpcurl
        run: |
          GRPCURL_VERSION=1.9.1
          curl -sSL \
            "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz" \
            | tar -xz -C /tmp grpcurl
          sudo mv /tmp/grpcurl /usr/local/bin/grpcurl
          grpcurl --version

      - name: Wait for grpcbin to be ready
        run: |
          echo "Waiting for grpcbin on localhost:9000 ..."
          for i in $(seq 1 15); do
            grpcurl -plaintext localhost:9000 list && echo "grpcbin is up!" && break
            echo "  attempt $i/15 — retrying in 2 s"
            sleep 2
          done

      - name: Run Sanity Tests
        shell: pwsh
        env:
          KARATE_LOGBACK : logback-ci.xml
          GRPC_HOST            : localhost
          GRPC_PORT            : "9000"
          AUTH_TOKEN           : ${{ secrets.AUTH_TOKEN }}
          API_KEY              : ${{ secrets.API_KEY }}
          CLIENT_ID            : ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET        : ${{ secrets.CLIENT_SECRET }}
          DUMMY_JSON_USERNAME  : ${{ secrets.DUMMY_JSON_USERNAME }}
          DUMMY_JSON_PASSWORD  : ${{ secrets.DUMMY_JSON_PASSWORD }}
        run: |
          ./karate.ps1 tags "@SanityTest" `
            -KarateEnv "${{ inputs.environment }}" `
            -Output "target/karate-reports"

      - name: Upload Sanity Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sanity-report-${{ github.run_number }}
          path: target/karate-reports/
          retention-days: 7

      - name: Teardown Summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Post-Test Cleanup Summary ==="
          Write-Host "WebSocket connections closed by afterScenario hooks."
          Write-Host "REST objects deleted by afterScenario hooks (PostCall, ReusableFeature)."
          Write-Host "DummyJSON token expires automatically (no logout endpoint)."
          $summaryFile = Get-ChildItem "target/karate-reports" -Filter "karate-summary.json" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($summaryFile) {
            $s = Get-Content $summaryFile.FullName | ConvertFrom-Json
            Write-Host "Passed: $($s.scenariosPassed) | Failed: $($s.scenariosFailed)"
          }
