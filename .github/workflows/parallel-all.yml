# =============================================================================
#  PARALLEL ALL TESTS — Manual trigger
#  Runs every feature file under src/test/java/examples/ in parallel.
#  Trigger: GitHub UI → Actions → Parallel All Tests → Run workflow
# =============================================================================

name: Parallel All Tests

on:
  workflow_dispatch:
    inputs:
      threads:
        description: "Number of parallel threads"
        required: false
        default: "4"
        type: choice
        options:
          - "2"
          - "4"
          - "6"
          - "8"

      environment:
        description: "Target environment to test against"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  parallel-all:
    name: "Run all features (${{ inputs.threads }} threads)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Run All Tests in Parallel
        shell: pwsh
        env:
          KARATE_LOGBACK : logback-ci.xml
          AUTH_TOKEN           : ${{ secrets.AUTH_TOKEN }}
          API_KEY              : ${{ secrets.API_KEY }}
          CLIENT_ID            : ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET        : ${{ secrets.CLIENT_SECRET }}
          DUMMY_JSON_USERNAME  : ${{ secrets.DUMMY_JSON_USERNAME }}
          DUMMY_JSON_PASSWORD  : ${{ secrets.DUMMY_JSON_PASSWORD }}
        run: |
          ./karate.ps1 parallel `
            -Threads ${{ inputs.threads }} `
            -KarateEnv "${{ inputs.environment }}" `
            -Output "target/karate-reports"

      - name: Upload Parallel Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parallel-all-report-${{ github.run_number }}
          path: target/karate-reports/
          retention-days: 7
