# =============================================================================
#  SMOKE TESTS — Manual trigger only
#  Runs all scenarios tagged @SmokeTest
#  Trigger: GitHub UI → Actions → Smoke Tests → Run workflow
# =============================================================================

name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to test against"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  smoke:
    name: Run @SmokeTest scenarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Run Smoke Tests
        shell: pwsh
        env:
          KARATE_LOGBACK : logback-ci.xml
          AUTH_TOKEN     : ${{ secrets.AUTH_TOKEN }}
          API_KEY        : ${{ secrets.API_KEY }}
          CLIENT_ID      : ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET  : ${{ secrets.CLIENT_SECRET }}
        run: |
          ./karate.ps1 tags "@SmokeTest" `
            -KarateEnv "${{ inputs.environment }}" `
            -Output "target/karate-reports"

      - name: Upload Smoke Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-report-${{ github.run_number }}
          path: target/karate-reports/
          retention-days: 7
